app:
  log_level: INFO
  name: AutoReadPaper
  version: 1.0.0
push:
  channels:
    email: true
    feishu: false
    github_issue: true
    telegram: false
    wecom: false
  max_papers_per_push: 20
  message_template: '## 📄 {title}

    **来源**: {source} | **日期**: {published_date}

    **链接**: {url}

    **作者**: {authors}


    **🤖 AI 速览**:

    {ai_summary}


    ---

    '
search:
  cache_ttl: 3600
  concurrency: 1
  default_max_results: 10
  request_delay: 3.0
  sources:
    arxiv:
      categories: []
      enabled: true
    biorxiv:
      days_back: 7
      enabled: false
      server: biorxiv
    pubmed:
      days_back: 7
      enabled: true
    semantic_scholar:
      enabled: false
      min_citation_count: 0
      require_abstract: true
summarizer:
  batch_size: 5
  language: zh
  max_tokens: 500
  prompt_template: '你是一名资深科研助手，擅长快速提取论文的核心价值。

    请用**250字以内的中文**总结以下论文，包含三个部分：

    1. **核心问题**：这篇论文解决了什么问题？

    2. **主要方法**：使用了什么关键技术或方法？

    3. **主要贡献**：最重要的结论或创新点是什么？


    论文标题：{title}

    论文摘要：{abstract}

    '
  temperature: 0.3
vector_store:
  collection_name: papers
  dedup_similarity_threshold: 0.94
  embedding_model: paraphrase-multilingual-MiniLM-L12-v2
  search_top_k: 10
